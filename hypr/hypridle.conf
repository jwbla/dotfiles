# hypridle — idle daemon config
# https://wiki.hypr.land/Hypr-Ecosystem/hypridle/

general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid multiple hyprlock instances
    before_sleep_cmd = loginctl lock-session    # lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on  # avoid double keypress to wake display
}

listener {
    timeout = 7200                         # lock after 2 hours
    on-timeout = loginctl lock-session
}

listener {
    timeout = 7260                         # screens off after 2 hours 1 min
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Optional: suspend after 30 min — uncomment to enable.
# listener {
#     timeout = 1800
#     on-timeout = systemctl suspend
# }
